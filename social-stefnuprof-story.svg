    <rect x="0" y="0" width="740" height="100" rx="16" fill="#2E7D32" fill-opacity="0.16" stroke="#2E7D32" stroke-opacity="0.5" stroke-width="2"/>
    <text x="370" y="65" text-anchor="middle" font-family="DM Sans, system-ui, sans-serif" font-size="38" fill="#FDFCFA">👍 Sammála</text>

    <rect x="0" y="120" width="740" height="100" rx="16" fill="#A8A4A0" fill-opacity="0.10" stroke="#A8A4A0" stroke-opacity="0.4" stroke-width="2"/>
    <text x="370" y="185" text-anchor="middle" font-family="DM Sans, system-ui, sans-serif" font-size="38" fill="#FDFCFA">😐 Hlutlaus</text>

    <rect x="0" y="240" width="740" height="100" rx="16" fill="#C62828" fill-opacity="0.14" stroke="#C62828" stroke-opacity="0.5" stroke-width="2"/>
