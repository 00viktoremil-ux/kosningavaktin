<!DOCTYPE html>
<html><head>
<style>html,body{margin:0;padding:0;background:transparent}</style>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&display=swap">
</head>
<body>
<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" style="display:block">
  <!-- Svartur bakgrunnur með gylltum ramma -->
  <rect x="0" y="0" width="512" height="512" rx="100" fill="#B8935A"/>
  <rect x="14" y="14" width="484" height="484" rx="88" fill="#000000"/>

  <!-- Solid gold X, miðjaður -->
  <g stroke="#C99B5E" stroke-width="62" stroke-linecap="round" fill="none">
    <line x1="130" y1="125" x2="382" y2="377"/>
    <line x1="382" y1="125" x2="130" y2="377"/>
  </g>

  <!-- Stór hvítur „26" í ítölsku serif-i, bottom-right, skarast aðeins við X -->
  <text x="495" y="472"
        text-anchor="end"
        font-family="'Playfair Display', Georgia, serif"
        font-style="italic"
        font-weight="700"
        font-size="216"
        fill="#FFFFFF">26</text>
</svg>
</body></html>
